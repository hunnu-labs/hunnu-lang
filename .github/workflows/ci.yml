name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake gcc clang-format

      - name: Check formatting
        run: |
          find compiler-core/compiler compiler-core/cli -name "*.c" -o -name "*.h" | while read f; do
            if ! clang-format --style=file --dry-run "$f" 2>/dev/null | diff -q "$f" - &>/dev/null; then
              echo "Format issue: $f"; exit 1
            fi
          done

      - name: Configure and build
        run: |
          mkdir -p build
          cd build
          cmake ..
          make -j$(nproc)

      - name: Run tests
        run: ./run_tests.sh

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build Rust compiler
        run: cd compiler-core/compiler-rust && cargo build

      - name: Run Rust tests
        run: cd compiler-core/compiler-rust && cargo test

      - name: Build Rust VM
        run: cd compiler-core/vm-rust && cargo build

      - name: Run VM tests
        run: cd compiler-core/vm-rust && cargo test
