name: Project Board Automation
on:
  issues:
    types: [opened, reopened, labeled, closed]
  pull_request_target:
    types: [opened, closed, merged]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  manage-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1
        id: add
        with:
          project-url: https://github.com/orgs/hunnu-labs/projects/1
          github-token: ${{ secrets.HUNNU_PROJECT_TOKEN }}

      - name: Set Status to In Progress when labeled
        if: github.event_name == 'issues' && github.event.action == 'labeled'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.HUNNU_PROJECT_TOKEN }}
          script: |
            const projectId = "PVT_kwDOEJvPc84BY0Xx";
            const itemId = "${{ steps.add.outputs.itemId }}";

            const statusFieldId = "PVTSSF_lADOEJvPc84BY0XxzhT3asg";
            const inProgressOptionId = "47fc9ee4";

            await github.graphql(`
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: "${projectId}"
                  itemId: "${itemId}"
                  fieldId: "${statusFieldId}"
                  value: { singleSelectOptionId: "${inProgressOptionId}" }
                }) {
                  projectV2Item { id }
                }
              }
            `);

      - name: Set Status to Done when closed
        if: github.event_name == 'issues' && github.event.action == 'closed'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.HUNNU_PROJECT_TOKEN }}
          script: |
            const projectId = "PVT_kwDOEJvPc84BY0Xx";
            const itemId = "${{ steps.add.outputs.itemId }}";

            const statusFieldId = "PVTSSF_lADOEJvPc84BY0XxzhT3asg";
            const doneOptionId = "98236657";

            await github.graphql(`
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: "${projectId}"
                  itemId: "${itemId}"
                  fieldId: "${statusFieldId}"
                  value: { singleSelectOptionId: "${doneOptionId}" }
                }) {
                  projectV2Item { id }
                }
              }
            `);

      - name: Set Area based on label
        if: github.event_name == 'issues' && github.event.action == 'labeled'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.HUNNU_PROJECT_TOKEN }}
          script: |
            const label = context.payload.label.name.toLowerCase();
            const projectId = "PVT_kwDOEJvPc84BY0Xx";
            const areaFieldId = "PVTSSF_lADOEJvPc84BY0XxzhT5oOI";
            const itemId = "${{ steps.add.outputs.itemId }}";

            const areaMap = {
              "compiler": "Compiler Core",
              "parser": "Compiler Core",
              "lexer": "Compiler Core",
              "interpreter": "Compiler Core",
              "vm": "Compiler Core",
              "ast": "Compiler Core",
              "transpile": "Compiler Core",
              "stdlib": "Stdlib",
              "tooling": "Tooling",
              "cli": "Tooling",
              "lsp": "Tooling",
              "docs": "Documentation",
              "documentation": "Documentation",
              "ci": "Infrastructure",
              "infrastructure": "Infrastructure",
              "build": "Infrastructure"
            };

            let area = "Compiler Core";
            for (const [key, value] of Object.entries(areaMap)) {
              if (label.includes(key)) { area = value; break; }
            }

            const areaQuery = await github.graphql(`
              query {
                node(id: "${areaFieldId}") {
                  ... on ProjectV2SingleSelectField {
                    options { id name }
                  }
                }
              }
            `);

            const option = areaQuery.node.options.find(o => o.name === area);
            if (option) {
              await github.graphql(`
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: "${projectId}"
                    itemId: "${itemId}"
                    fieldId: "${areaFieldId}"
                    value: { singleSelectOptionId: "${option.id}" }
                  }) {
                    projectV2Item { id }
                  }
                }
              `);
            }
